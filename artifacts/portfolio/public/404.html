<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | Abhishek Adhikari</title>
  <meta name="robots" content="noindex" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3efe6;
      color: #1a1a1a;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 28rem; }
    h1 { font-size: 5rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.25rem; }
    p { font-size: 1.125rem; color: rgba(26,26,26,0.6); margin-bottom: 2rem; line-height: 1.6; }
    a {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: #1a1a1a; color: white; text-decoration: none;
      padding: 0.625rem 1.25rem; border-radius: 0.5rem;
      font-size: 0.875rem; font-weight: 500;
      transition: background 0.2s;
    }
    a:hover { background: rgba(26,26,26,0.85); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>The page you are looking for does not exist or has been moved.</p>
    <a href="/">Home</a>
  </div>
</body>
</html>
